<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1e1b4b" />

  <!-- Wheel segments (6 slices) -->
  <!-- Segment 1: Purple top-right -->
  <path d="M50 50 L50 4 A46 46 0 0 1 89.8 27 Z" fill="#8b5cf6"/>
  <!-- Segment 2: Orange right -->
  <path d="M50 50 L89.8 27 A46 46 0 0 1 89.8 73 Z" fill="#f97316"/>
  <!-- Segment 3: Pink bottom-right -->
  <path d="M50 50 L89.8 73 A46 46 0 0 1 50 96 Z" fill="#ec4899"/>
  <!-- Segment 4: Blue bottom-left -->
  <path d="M50 50 L50 96 A46 46 0 0 1 10.2 73 Z" fill="#3b82f6"/>
  <!-- Segment 5: Green left -->
  <path d="M50 50 L10.2 73 A46 46 0 0 1 10.2 27 Z" fill="#22c55e"/>
  <!-- Segment 6: Red top-left -->
  <path d="M50 50 L10.2 27 A46 46 0 0 1 50 4 Z" fill="#ef4444"/>

  <!-- Divider lines between segments -->
  <line x1="50" y1="50" x2="50" y2="4" stroke="#1e1b4b" stroke-width="2"/>
  <line x1="50" y1="50" x2="89.8" y2="27" stroke="#1e1b4b" stroke-width="2"/>
  <line x1="50" y1="50" x2="89.8" y2="73" stroke="#1e1b4b" stroke-width="2"/>
  <line x1="50" y1="50" x2="50" y2="96" stroke="#1e1b4b" stroke-width="2"/>
  <line x1="50" y1="50" x2="10.2" y2="73" stroke="#1e1b4b" stroke-width="2"/>
  <line x1="50" y1="50" x2="10.2" y2="27" stroke="#1e1b4b" stroke-width="2"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#fbbf24" stroke-width="3"/>

  <!-- Center golden circle -->
  <circle cx="50" cy="50" r="12" fill="#fbbf24"/>
  <circle cx="50" cy="50" r="8" fill="#f59e0b"/>

  <!-- Star in center -->
  <polygon points="50,43 52,48 57,48 53,51 55,56 50,53 45,56 47,51 43,48 48,48"
           fill="#1e1b4b"/>

  <!-- Pointer triangle at top -->
  <polygon points="50,0 44,10 56,10" fill="#fbbf24"/>
</svg>