<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vòng Quay May Mắn - Random Name Wheel</title>
    <meta name="description" content="Vòng quay may mắn ngẫu nhiên - Công cụ lựa chọn ngẫu nhiên trực quan, nhanh chóng và thú vị." />
    <!-- Anti-flash: Apply dark class BEFORE any content renders -->
    <script>
      (function () {
        var saved = localStorage.getItem('vqmm_theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (saved === null && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
